<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rickpedia - Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #202329;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #3c3e44;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        h1 {
            color: #97ce4c;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f5f5f5;
        }
        .btn-group {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-primary {
            background-color: #97ce4c;
            color: #202329;
        }
        .btn-secondary {
            background-color: #e89ac7;
            color: #202329;
        }
        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rickpedia API</h1>
        <p>Bem-vindo ao projeto Rickpedia! Esta é uma aplicação Django que consome a API de Rick and Morty para gerenciar personagens, favoritos e listas personalizadas.</p>
        <div class="btn-group">
            <a href="/swagger/" class="btn btn-primary">Documentação Swagger</a>
            <a href="/admin/" class="btn btn-secondary">Painel Admin</a>
        </div>
    </div>
</body>
</html>
