{% extends 'base.html' %}

{% block title %}Início - Rickpedia{% endblock %}

{% block content %}
<div id="main-content">
    <!-- Hero Section -->
    <div class="text-center py-5">
        <h1 class="display-3 fw-bold text-white mb-3" style="font-family: Arial, sans-serif; text-shadow: 2px 2px var(--rm-green);">RICKPEDIA</h1>
        <p class="lead text-secondary">Explore o multiverso de Rick and Morty</p>
    </div>

    <!-- Search Section -->
    <div class="search-container">
        <form id="search-form" class="row g-3">
            <div class="col-md-8">
                <input type="text" id="search-name" class="form-control bg-dark text-white border-secondary" placeholder="Nome do personagem...">
            </div>
            <div class="col-md-3">
                <select id="search-status" class="form-select bg-dark text-white border-secondary">
                    <option value="">Todos os Status</option>
                    <option value="alive">Vivo</option>
                    <option value="dead">Morto</option>
                    <option value="unknown">Desconhecido</option>
                </select>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-rm-green w-100"><i class="fas fa-search"></i></button>
            </div>
        </form>
    </div>

    <!-- Characters Grid -->
    <div id="characters-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mb-5">
        <!-- Characters will be loaded here -->
    </div>

    <!-- Pagination -->
    <nav aria-label="Page navigation" class="mb-5">
        <ul id="pagination" class="pagination justify-content-center">
            <!-- Pagination will be loaded here -->
        </ul>
    </nav>
</div>

<!-- Template for View List/Favorites -->
<div id="list-content" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="list-title">Minha Lista</h2>
        <button class="btn btn-outline-light btn-sm" onclick="showHome()"><i class="fas fa-arrow-left me-1"></i> Voltar</button>
    </div>
    <div id="list-items-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
        <!-- Items will be loaded here -->
    </div>
</div>

<div id="my-lists-content" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Minhas Listas</h2>
        <div>
            <button class="btn btn-rm-green btn-sm" onclick="createListModal.show()"><i class="fas fa-plus me-1"></i> Nova Lista</button>
            <button class="btn btn-outline-light btn-sm" onclick="showHome()"><i class="fas fa-arrow-left me-1"></i> Voltar</button>
        </div>
    </div>
    <div id="my-lists-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <!-- User lists will be loaded here -->
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;

    async function loadCharacters(page = 1, name = '', status = '') {
        showLoading();
        let url = `/api/characters/?page=${page}`;
        if (name) url += `&name=${name}`;
        if (status) url += `&status=${status}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (response.ok) {
                renderCharacters(data.results);
                renderPagination(data.info, page, name, status);
            } else {
                document.getElementById('characters-grid').innerHTML = '<div class="col-12 text-center p-5"><h3>Nenhum personagem encontrado.</h3></div>';
                document.getElementById('pagination').innerHTML = '';
            }
        } catch (err) {
            Swal.fire('Erro', 'Erro ao carregar personagens', 'error');
        } finally {
            hideLoading();
        }
    }

    function renderCharacters(characters) {
        const grid = document.getElementById('characters-grid');
        const isAuth = !!localStorage.getItem('rm_token');

        grid.innerHTML = characters.map(c => `
            <div class="col">
                <div class="card h-100">
                    <img src="${c.image}" class="card-img-top" alt="${c.name}" loading="lazy">
                    <div class="card-body">
                        <h5 class="card-title text-rm-green fw-bold">${c.name}</h5>
                        <p class="card-text mb-1">
                            <span class="status-indicator status-${c.status.toLowerCase()}"></span>
                            ${c.status} - ${c.species}
                        </p>
                        <p class="card-text small text-secondary">
                            <i class="fas fa-map-marker-alt me-1"></i> ${c.location.name}
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-top border-secondary d-flex justify-content-between">
                        <button class="btn btn-sm btn-outline-light" onclick="toggleFavorite(${c.id})" title="Favoritar">
                            <i class="fas fa-heart"></i>
                        </button>
                        <button class="btn btn-sm btn-rm-green" onclick="openAddToList(${c.id})">
                            <i class="fas fa-plus me-1"></i> Lista
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderPagination(info, page, name, status) {
        const pagination = document.getElementById('pagination');
        if (!info || info.pages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        html += `<li class="page-item ${!info.prev ? 'disabled' : ''}">
                <button class="page-link bg-dark text-white border-secondary" onclick="loadCharacters(${page - 1}, '${name}', '${status}')">Anterior</button>
            </li>`;
        html += `<li class="page-item active"><span class="page-link bg-rm-green border-rm-green text-dark">${page} de ${info.pages}</span></li>`;
        html += `<li class="page-item ${!info.next ? 'disabled' : ''}">
                <button class="page-link bg-dark text-white border-secondary" onclick="loadCharacters(${page + 1}, '${name}', '${status}')">Próxima</button>
            </li>`;
        pagination.innerHTML = html;
    }

    document.getElementById('search-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('search-name').value;
        const status = document.getElementById('search-status').value;
        loadCharacters(1, name, status);
    });

    function showHome() {
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('list-content').style.display = 'none';
        document.getElementById('my-lists-content').style.display = 'none';
        loadCharacters();
    }

    async function showFavorites() {
        if (!localStorage.getItem('rm_token')) return showLoginModal();
        showLoading();
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('my-lists-content').style.display = 'none';
        const listContent = document.getElementById('list-content');
        listContent.style.display = 'block';
        document.getElementById('list-title').innerText = 'Meus Favoritos';

        try {
            const response = await apiFetch('/api/lists/favorites/');
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            const grid = document.getElementById('list-items-grid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center p-5"><h3>Você ainda não tem favoritos.</h3></div>';
            } else {
                grid.innerHTML = data.map(item => renderItemCard(item.character, 'favorite')).join('');
            }
        } catch (err) {
            Swal.fire('Erro', 'Erro ao carregar favoritos', 'error');
        } finally {
            hideLoading();
        }
    }

    async function showMyLists() {
        if (!localStorage.getItem('rm_token')) return showLoginModal();
        showLoading();
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('list-content').style.display = 'none';
        const myListsContent = document.getElementById('my-lists-content');
        myListsContent.style.display = 'block';

        try {
            const response = await apiFetch('/api/lists/');
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            const grid = document.getElementById('my-lists-grid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center p-5"><h3>Você não tem listas.</h3></div>';
            } else {
                grid.innerHTML = data.map(list => `
                    <div class="col" id="list-card-${list.id}">
                        <div class="card h-100 border-1 border-secondary">
                            <div class="card-body text-center">
                                <i class="fas fa-list-ul fa-3x mb-3 text-rm-blue"></i>
                                <h4 class="card-title">${list.name}</h4>
                                <div class="d-grid gap-2 mt-3">
                                    <button class="btn btn-rm-blue" onclick="showListDetails(${list.id}, '${list.name}')">Ver Itens</button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="deleteList(${list.id})">Excluir Lista</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        } catch (err) {
            Swal.fire('Erro', 'Erro ao carregar listas', 'error');
        } finally {
            hideLoading();
        }
    }

    async function showListDetails(listId, listName) {
        showLoading();
        document.getElementById('my-lists-content').style.display = 'none';
        const listContent = document.getElementById('list-content');
        listContent.style.display = 'block';
        document.getElementById('list-title').innerText = `Lista: ${listName}`;

        try {
            const response = await apiFetch(`/api/lists/${listId}/items/`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            const grid = document.getElementById('list-items-grid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center p-5"><h3>Esta lista está vazia.</h3></div>';
            } else {
                grid.innerHTML = data.map(item => renderItemCard(item.character, 'list', listId)).join('');
            }
        } catch (err) {
            Swal.fire('Erro', 'Erro ao carregar itens da lista', 'error');
        } finally {
            hideLoading();
        }
    }

    function renderItemCard(c, type, listId = null) {
        return `
            <div class="col" id="item-${c.api_id}">
                <div class="card h-100">
                    <img src="${c.image}" class="card-img-top" alt="${c.name}">
                    <div class="card-body">
                        <h5 class="card-title text-rm-green fw-bold">${c.name}</h5>
                        <p class="card-text mb-1">
                            <span class="status-indicator status-${c.status.toLowerCase()}"></span>
                            ${c.status} - ${c.species}
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-top border-secondary text-center">
                        <button class="btn btn-sm btn-outline-danger w-100" onclick="removeItem('${c.api_id}', '${type}', ${listId})">
                            <i class="fas fa-trash me-1"></i> Remover
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    async function removeItem(apiId, type, listId) {
        const result = await Swal.fire({
            title: 'Tem certeza?',
            text: "Deseja remover este personagem?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Sim, remover!',
            cancelButtonText: 'Cancelar'
        });

        if (result.isConfirmed) {
            let url = type === 'favorite' ? '/api/lists/favorites/' : `/api/lists/${listId}/items/`;
            try {
                const response = await apiFetch(url, {
                    method: 'DELETE',
                    body: { api_id: apiId }
                });
                if (response.ok) {
                    document.getElementById(`item-${apiId}`).remove();
                    Swal.fire('Removido!', 'Personagem removido com sucesso.', 'success');
                }
            } catch (err) {
                Swal.fire('Erro', 'Erro ao remover item', 'error');
            }
        }
    }

    async function deleteList(listId) {
        const result = await Swal.fire({
            title: 'Excluir Lista?',
            text: "Isso removerá a lista e todos os seus itens permanentemente.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Excluir',
            cancelButtonText: 'Cancelar'
        });

        if (result.isConfirmed) {
            try {
                const response = await apiFetch('/api/lists/', {
                    method: 'DELETE',
                    body: { id: listId }
                });
                if (response.ok) {
                    document.getElementById(`list-card-${listId}`).remove();
                    Swal.fire('Excluída!', 'Lista removida com sucesso.', 'success');
                }
            } catch (err) {
                Swal.fire('Erro', 'Erro ao excluir lista', 'error');
            }
        }
    }

    loadCharacters();
</script>
{% endblock %}
